[pytest]
DJANGO_SETTINGS_MODULE = config.settings.development
python_files = test_*.py
testpaths = .
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    colab: tests nécessitant COLAB_LLM_URL actif (skipés si absent)
    slow: tests lents — benchmarks ou inférence LLM réelle
    smoke: tests smoke contre un environnement staging déployé
