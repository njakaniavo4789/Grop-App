name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  # ─── Backend Tests ────────────────────────────────────────────────
  backend-tests:
    name: Backend — Tests & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cropgpt_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements/development.txt

      - name: Install dependencies
        run: pip install -r backend/requirements/development.txt

      - name: Run migrations
        working-directory: backend
        env:
          SECRET_KEY: ci-secret-key-not-for-prod
          DJANGO_SETTINGS_MODULE: config.settings.development
          DATABASE_URL: postgres://postgres:postgres@localhost/cropgpt_test
        run: python manage.py migrate --noinput

      - name: Run tests with coverage
        working-directory: backend
        env:
          SECRET_KEY: ci-secret-key-not-for-prod
          DJANGO_SETTINGS_MODULE: config.settings.development
          DATABASE_URL: postgres://postgres:postgres@localhost/cropgpt_test
          LLM_PROVIDER: anthropic
          ANTHROPIC_API_KEY: dummy-for-tests
        run: |
          python -m pytest \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend

      - name: Lint with flake8
        working-directory: backend
        run: |
          flake8 . \
            --max-line-length=120 \
            --exclude=migrations,__pycache__,.venv \
            --per-file-ignores="*/tests/*:E501"

  # ─── Pipeline Unit Tests (sans DB) ───────────────────────────────
  pipeline-tests:
    name: Pipeline — Unit Tests (no DB)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements/development.txt

      - name: Install dependencies
        run: pip install -r backend/requirements/development.txt

      - name: Test normalizer
        working-directory: backend
        env:
          SECRET_KEY: ci-key
          DJANGO_SETTINGS_MODULE: config.settings.development
        run: python -m pytest chat/tests/test_pipeline.py predictions/tests/test_predictions.py -v

  # ─── Frontend Tests ───────────────────────────────────────────────
  frontend-tests:
    name: Frontend — Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npm run lint

      - name: Build (validates syntax & imports)
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8000

      # Décommenter quand Vitest sera configuré :
      # - name: Unit tests
      #   run: npm run test
