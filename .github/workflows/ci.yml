name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  # ─── 1. Lint (gate rapide) ────────────────────────────────────────────────
  lint:
    name: Lint — flake8 + ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/development.txt

      - name: Install Python deps
        run: pip install -r backend/requirements/development.txt

      - name: flake8
        working-directory: backend
        run: |
          flake8 . \
            --max-line-length=120 \
            --exclude=migrations,__pycache__,venv,venv312,.venv \
            --per-file-ignores="*/tests/*:E501"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: ESLint
        run: npm run lint

  # ─── 2. Tests unitaires (sans DB) ────────────────────────────────────────
  unit-tests:
    name: Unit Tests — pipeline, prédictions, ontologie
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/development.txt

      - name: Install dependencies
        run: pip install -r backend/requirements/development.txt

      - name: Run unit tests
        working-directory: backend
        env:
          SECRET_KEY: ci-secret-key-not-for-prod
          DJANGO_SETTINGS_MODULE: config.settings.development
          COLAB_LLM_URL: ${{ secrets.COLAB_LLM_URL }}
        run: |
          python -m pytest \
            chat/tests/test_pipeline.py \
            chat/tests/test_ontology_ci.py \
            chat/tests/test_llm_colab.py \
            predictions/tests/test_predictions.py \
            -v --tb=short

  # ─── 3. Tests d'intégration (avec Postgres) ──────────────────────────────
  integration-tests:
    name: Integration Tests — API, modèles DB
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cropgpt_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/development.txt

      - name: Install dependencies
        run: pip install -r backend/requirements/development.txt

      - name: Run migrations
        working-directory: backend
        env:
          SECRET_KEY: ci-secret-key-not-for-prod
          DJANGO_SETTINGS_MODULE: config.settings.development
          DATABASE_URL: postgres://postgres:postgres@localhost/cropgpt_test
        run: python manage.py migrate --noinput

      - name: Run integration tests with coverage
        working-directory: backend
        env:
          SECRET_KEY: ci-secret-key-not-for-prod
          DJANGO_SETTINGS_MODULE: config.settings.development
          DATABASE_URL: postgres://postgres:postgres@localhost/cropgpt_test
          COLAB_LLM_URL: ${{ secrets.COLAB_LLM_URL }}
        run: |
          python -m pytest \
            chat/tests/test_views.py \
            crops/tests/test_models.py \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -v --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend

  # ─── 4. Tests RAG (FAISS + pipeline retrieval) ───────────────────────────
  rag-tests:
    name: RAG Tests — retrieval, confiance, contexte
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cropgpt_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/development.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements/development.txt
          pip install faiss-cpu sentence-transformers

      - name: Run migrations
        working-directory: backend
        env:
          SECRET_KEY: ci-secret-key-not-for-prod
          DJANGO_SETTINGS_MODULE: config.settings.development
          DATABASE_URL: postgres://postgres:postgres@localhost/cropgpt_test
        run: python manage.py migrate --noinput

      - name: Run RAG tests
        working-directory: backend
        env:
          SECRET_KEY: ci-secret-key-not-for-prod
          DJANGO_SETTINGS_MODULE: config.settings.development
          DATABASE_URL: postgres://postgres:postgres@localhost/cropgpt_test
        run: |
          python -m pytest \
            chat/tests/test_rag.py \
            -v --tb=short

  # ─── 5. Frontend build ────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (valide la syntaxe et les imports)
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8000
