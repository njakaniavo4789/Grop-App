# render.yaml — Infrastructure as Code pour Render
# Doc : https://render.com/docs/blueprint-spec
#
# Services définis :
#   grop-app-backend-staging   Web Service Docker (staging)
#   grop-app-backend           Web Service Docker (production)
#   grop-app-frontend          Static Site (production)
#
# Bases de données :
#   grop-app-db-staging        PostgreSQL (staging)
#   grop-app-db                PostgreSQL (production)
#
# ⚠️  Les valeurs sync: false signifient que les envVars ne sont pas
#      écrasées à chaque déploiement — les modifier dans le dashboard Render.

databases:
  - name: grop-app-db-staging
    databaseName: cropgpt_staging
    user: cropgpt
    plan: free

  - name: grop-app-db
    databaseName: cropgpt
    user: cropgpt
    plan: free

services:
  # ─── Backend Staging ──────────────────────────────────────────────────────
  - type: web
    name: grop-app-backend-staging
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    branch: main
    plan: free
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: grop-app-db-staging
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://grop-app-frontend.onrender.com
      - key: COLAB_LLM_URL
        sync: false   # À définir manuellement dans le dashboard Render
      - key: DEBUG
        value: "False"
      - key: ENVIRONMENT
        value: staging

  # ─── Backend Production ───────────────────────────────────────────────────
  - type: web
    name: grop-app-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    branch: main
    plan: free
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: grop-app-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://grop-app-frontend.onrender.com
      - key: COLAB_LLM_URL
        sync: false   # À définir manuellement dans le dashboard Render
      - key: DEBUG
        value: "False"
      - key: ENVIRONMENT
        value: production

  # ─── Frontend Production (Static Site) ───────────────────────────────────
  - type: web
    name: grop-app-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    branch: main
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false   # Ex : https://grop-app-backend.onrender.com
